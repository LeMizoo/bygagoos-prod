version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: bygagoos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - bygagoos-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bygagoos-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://host.docker.internal:27017/bygagoos-ink
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - redis
    networks:
      - bygagoos-network
    command: npm run dev

volumes:
  redis_data:

networks:
  bygagoos-network:
    driver: bridge