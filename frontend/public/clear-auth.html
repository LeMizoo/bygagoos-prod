<!DOCTYPE html>
<html>
<head>
    <title>Nettoyage Authentification</title>
    <script>
        function clearAuth() {
            localStorage.clear();
            document.getElementById('status').innerHTML = '✅ localStorage nettoyé!';
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    </script>
</head>
<body>
    <h1>Nettoyage de l'authentification</h1>
    <button onclick="clearAuth()">Nettoyer et retourner à l'accueil</button>
    <p id="status"></p>
</body>
</html>
