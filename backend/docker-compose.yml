version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: bygagoos-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: bygagoos-ink
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - bygagoos-network

  redis:
    image: redis:7-alpine
    container_name: bygagoos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bygagoos-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: bygagoos-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/bygagoos-ink?authSource=admin
      REDIS_URL: redis://redis:6379
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - /app/node_modules
    depends_on:
      - mongodb
      - redis
    networks:
      - bygagoos-network

networks:
  bygagoos-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data: